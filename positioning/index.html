document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\ndetails[open] .faq-ic{transform:rotate(45deg)}\n@media(max-width:860px){\n  .nz-hero-h1{font-size:clamp(40px,11vw,62px)!important}\n  .nz-grid2{grid-template-columns:1fr!important}\n  .nz-grid3{grid-template-columns:1fr!important}\n  .nz-grid4{grid-template-columns:1fr 1fr!important}\n  .nz-deliv{grid-template-columns:1fr!important}\n  .nz-navlinks{display:none!important}\n  .nz-foot{grid-template-columns:1fr!important}\n  .nz-cloud{height:auto!important;display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:24px!important;place-items:center}\n  .nz-cloud .nz-logo-abs{position:static!important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:relative;background:var(--bg);min-height:100vh;overflow:hidden\">\n\n<canvas id=\"nz-sakura\" style=\"position:fixed;inset:0;width:100vw;height:100vh;z-index:6;pointer-events:none\"><\u002Fcanvas>\n\n<!-- ambient warm glows -->\n<div style=\"position:absolute;top:-220px;left:50%;transform:translateX(-50%);width:1200px;height:820px;background:radial-gradient(ellipse at center,rgba(229,155,176,0.22),transparent 66%);pointer-events:none;z-index:0\"><\u002Fdiv>\n<div style=\"position:absolute;top:1700px;right:-340px;width:920px;height:920px;background:radial-gradient(circle,rgba(196,98,122,0.10),transparent 64%);pointer-events:none;z-index:0\"><\u002Fdiv>\n\n<!-- NAV -->\n<nav style=\"position:sticky;top:0;z-index:40;background:rgba(251,245,240,0.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--bsub)\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 26px;height:70px;display:flex;align-items:center;justify-content:space-between\">\n    <a href=\"https://nozomi.network/\" style=\"display:flex;align-items:center;color:var(--ink);text-decoration:none\">\n      <img src=\"ddfa71fc-48b7-4413-816c-7af1293d7c20\" alt=\"Nozomi\" style=\"height:24px;width:auto;display:block\">\n    <\u002Fa>\n    <div class=\"nz-navlinks\" style=\"display:flex;align-items:center;gap:30px\">\n      <a href=\"#deliverables\" style=\"font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ts);text-decoration:none;transition:color .25s ease\" style-hover=\"color:var(--ink)\">Deliverables<\u002Fa>\n      <a href=\"#insight\" style=\"font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ts);text-decoration:none;transition:color .25s ease\" style-hover=\"color:var(--ink)\">The Insight<\u002Fa>\n      <a href=\"#process\" style=\"font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ts);text-decoration:none;transition:color .25s ease\" style-hover=\"color:var(--ink)\">Process<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <a href=\"https://nozomi.network/\" style=\"font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ts);text-decoration:none;padding:10px 18px;border:1px solid var(--bmed);border-radius:100px;transition:all .25s ease\" style-hover=\"color:var(--ink);border-color:var(--bstr)\">Back<\u002Fa>\n      <a href=\"https://forms.fillout.com/t/fiYYkaHNbeus\" style=\"font-family:var(--fd);font-weight:600;font-size:13px;color:#FBF5F0;background:var(--ink);text-decoration:none;padding:11px 22px;border-radius:100px;transition:transform .25s ease\" style-hover=\"transform:translateY(-1px)\">Book a call<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section data-screen-label=\"Hero\" style=\"position:relative;z-index:2;text-align:center;padding:100px 26px 88px\">\n  <div style=\"position:absolute;top:40px;left:50%;transform:translateX(-50%);font-family:var(--fs);font-style:italic;font-size:clamp(300px,40vw,560px);color:var(--rose);line-height:1;pointer-events:none;z-index:0;opacity:0.06\">望<\u002Fdiv>\n  <div style=\"position:relative;z-index:2;max-width:1000px;margin:0 auto\">\n    <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:var(--fm);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);border:1px solid var(--bmed);border-radius:100px;padding:8px 18px;margin-bottom:30px;background:rgba(255,255,255,0.5)\">\n      <span style=\"width:5px;height:5px;border-radius:50%;background:var(--rose)\"><\u002Fspan>Narrative and Messaging Overhaul\n    <\u002Fdiv>\n    <h1 class=\"nz-hero-h1\" style=\"font-family:var(--fd);font-weight:700;font-size:clamp(46px,7.6vw,98px);line-height:0.98;letter-spacing:-0.04em;color:var(--ink);max-width:15ch;margin:0 auto;text-wrap:balance\">Own Your <span style=\"font-family:var(--fs);font-weight:400;font-style:italic;color:var(--rose);letter-spacing:-0.01em\">Category<\u002Fspan> in 14 Days<\u002Fh1>\n    <p style=\"font-family:var(--fd);font-weight:500;font-size:clamp(17px,2.2vw,23px);color:var(--ts);max-width:30ch;margin:22px auto 0;line-height:1.3\">Instead of being another generic L1 or dapp nobody remembers.<\u002Fp>\n    <p style=\"font-size:clamp(15px,1.7vw,18px);color:var(--ts);max-width:62ch;margin:26px auto 0;line-height:1.7\">We rebuild your positioning, then rewrite your pitch deck, website, and sales pages around a narrative people remember, so VCs close faster, your team focuses on building, and your community spreads your message for you.<\u002Fp>\n    <div style=\"display:flex;gap:13px;justify-content:center;flex-wrap:wrap;margin-top:38px\">\n      <a href=\"https://forms.fillout.com/t/fiYYkaHNbeus\" style=\"font-family:var(--fd);font-weight:600;font-size:15px;color:#FBF5F0;background:var(--ink);text-decoration:none;padding:16px 32px;border-radius:100px;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 36px rgba(26,16,24,0.18);transition:transform .25s ease\" style-hover=\"transform:translateY(-2px)\">Apply Now\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FBF5F0\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fa>\n      <a href=\"#deliverables\" style=\"font-family:var(--fd);font-weight:600;font-size:15px;color:var(--ink);background:var(--card);text-decoration:none;padding:16px 32px;border-radius:100px;border:1px solid var(--bmed);transition:all .25s ease\" style-hover=\"border-color:var(--rose)\">See What You Get<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:30px\">\n      <span style=\"font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--ts);background:var(--card);border:1px solid var(--bsub);border-radius:100px;padding:8px 16px\">14 days start to finish<\u002Fspan>\n      <span style=\"font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--ts);background:var(--card);border:1px solid var(--bsub);border-radius:100px;padding:8px 16px\">2 teams at a time<\u002Fspan>\n      <span style=\"font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--ts);background:var(--card);border:1px solid var(--bsub);border-radius:100px;padding:8px 16px\">Strategy plus the finished files<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DELIVERABLES (editorial index) -->\n<section data-screen-label=\"Deliverables\" id=\"deliverables\" style=\"position:relative;z-index:2;padding:60px 26px 90px\">\n  <div style=\"max-width:1180px;margin:0 auto\">\n    <div style=\"max-width:64ch;margin:0 auto 56px;text-align:center\">\n      <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose);margin-bottom:18px\">What You Walk Away With<\u002Fdiv>\n      <h2 style=\"font-family:var(--fd);font-weight:700;font-size:clamp(30px,4.6vw,52px);line-height:1.05;letter-spacing:-0.025em;color:var(--ink)\">Real files your team uses <span style=\"font-family:var(--fs);font-weight:400;font-style:italic;color:var(--rose)\">the next day<\u002Fspan><\u002Fh2>\n      <p style=\"font-size:16px;color:var(--ts);line-height:1.7;margin-top:18px\">Not a slide deck full of theory. You get your positioning locked, your story written, and every piece of copy that matters rewritten and ready to ship.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"nz-deliv\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 64px\">\n      <div>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bmed)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">01<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">One Story Your Whole Team Tells Without You<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">Founders pitch it one way, devs another, marketing a third. We lock one story everyone tells the same way, without checking with you first. No more debates. No more \"well, it depends.\"<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bsub)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">02<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">A Category You Own, Where Competition Stops Mattering<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">You stop competing and start dominating a category that is yours alone. The fight on speed and fees is over, because you are no longer standing in it.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bsub)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">03<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">A Complete Market Narrative<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">What problem exists, why it is urgent, why now, why only you can solve it, and what the world looks like when you win. The narrative VCs repeat to other VCs, and the one your community spreads on CT without you asking.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bsub)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">04<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">Positioning That Ends the Comparisons<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">Stop defending against \"isn't this just like Base or Solana.\" You get a clear difference that makes the comparison pointless. Not 10 percent faster. Fundamentally different.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bmed)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">05<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">A Stakeholder Messaging Framework<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">Three versions of your story for three audiences. VCs get the thesis in 60 seconds. Users get why it matters in words they actually use. Your community can pitch you better than your marketing team.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bsub)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">06<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">A Fundraising Narrative That Closes<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">Why now, why you, why this market, all locked before a VC can ask. Your deck stops changing every week on conflicting feedback. One story that holds up across every pitch.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bsub)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">07<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">A Brand Voice People Recognize<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">One consistent tone across every channel. People know your posts on CT before they see your logo. You stop sounding like every other \"building the future of decentralized X\" project and start sounding like you.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:baseline;padding:30px 0;border-top:1px solid var(--bsub)\">\n          <span style=\"font-family:var(--fs);font-style:italic;font-size:42px;color:var(--rose);line-height:1;flex-shrink:0;width:48px\">08<\u002Fspan>\n          <div><h3 style=\"font-family:var(--fd);font-weight:600;font-size:20px;line-height:1.25;letter-spacing:-0.01em;margin-bottom:10px\">A Company Messaging Hub, Your Source of Truth<\u002Fh3><p style=\"font-size:14.5px;color:var(--ts);line-height:1.7\">One master document your whole team uses forever. Your decks, website, PR, and community messaging all pull from it. You never debate positioning again.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FILES -->\n    <div style=\"position:relative;background:var(--card);border:1px solid var(--bsub);border-radius:22px;padding:42px 38px;margin-top:48px;overflow:hidden;box-shadow:var(--shadow)\">\n      <div style=\"position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--sakura),transparent)\"><\u002Fdiv>\n      <div style=\"position:absolute;top:-40px;right:-20px;font-family:var(--fs);font-style:italic;font-size:200px;color:rgba(196,98,122,0.05);line-height:1;pointer-events:none\">望<\u002Fdiv>\n      <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--rose);margin-bottom:14px\">The Files We Hand You<\u002Fdiv>\n      <h3 style=\"font-family:var(--fd);font-weight:700;font-size:clamp(22px,3vw,30px);letter-spacing:-0.02em;margin-bottom:8px\">Every Asset, Rewritten and Ready to Ship<\u002Fh3>\n      <p style=\"font-size:15px;color:var(--ts);max-width:62ch;margin-bottom:24px;line-height:1.7\">The new story does not sit in a document. It goes straight into the work that faces your investors, your users, and the market.<\u002Fp>\n      <div class=\"nz-grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 40px;position:relative\">\n        <div style=\"font-family:var(--fd);font-weight:500;font-size:16px;padding:13px 0 13px 24px;border-top:1px solid var(--bsub);position:relative;color:var(--ink)\"><span style=\"position:absolute;left:0;color:var(--rose)\">+<\u002Fspan>Pitch deck copy and structure<\u002Fdiv>\n        <div style=\"font-family:var(--fd);font-weight:500;font-size:16px;padding:13px 0 13px 24px;border-top:1px solid var(--bsub);position:relative;color:var(--ink)\"><span style=\"position:absolute;left:0;color:var(--rose)\">+<\u002Fspan>Investor and sales deck<\u002Fdiv>\n        <div style=\"font-family:var(--fd);font-weight:500;font-size:16px;padding:13px 0 13px 24px;border-top:1px solid var(--bsub);position:relative;color:var(--ink)\"><span style=\"position:absolute;left:0;color:var(--rose)\">+<\u002Fspan>One pager and investor memo<\u002Fdiv>\n        <div style=\"font-family:var(--fd);font-weight:500;font-size:16px;padding:13px 0 13px 24px;border-top:1px solid var(--bsub);position:relative;color:var(--ink)\"><span style=\"position:absolute;left:0;color:var(--rose)\">+<\u002Fspan>Full website copy<\u002Fdiv>\n        <div style=\"font-family:var(--fd);font-weight:500;font-size:16px;padding:13px 0 13px 24px;border-top:1px solid var(--bsub);position:relative;color:var(--ink)\"><span style=\"position:absolute;left:0;color:var(--rose)\">+<\u002Fspan>Litepaper and vision narrative<\u002Fdiv>\n        <div style=\"font-family:var(--fd);font-weight:500;font-size:16px;padding:13px 0 13px 24px;border-top:1px solid var(--bsub);position:relative;color:var(--ink)\"><span style=\"position:absolute;left:0;color:var(--rose)\">+<\u002Fspan>Elevator pitch and FAQ<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEM -->\n<section data-screen-label=\"Problem\" style=\"position:relative;z-index:2;padding:80px 26px;border-top:1px solid var(--bsub)\">\n  <div style=\"max-width:820px;margin:0 auto;text-align:center\">\n    <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose);margin-bottom:18px\">The Problem<\u002Fdiv>\n    <h2 style=\"font-family:var(--fd);font-weight:700;font-size:clamp(28px,4.4vw,46px);line-height:1.1;letter-spacing:-0.025em;color:var(--ink);max-width:18ch;margin:0 auto\">There Are Thousands of L1s, L2s, and Dapps. You Can Name <span style=\"font-family:var(--fs);font-weight:400;font-style:italic;color:var(--rose)\">Maybe Five.<\u002Fspan><\u002Fh2>\n    <div style=\"margin-top:40px;font-family:var(--fd);font-weight:500;font-size:clamp(19px,2.6vw,26px);line-height:1.5;letter-spacing:-0.01em\">\n      <p style=\"margin-bottom:20px\">The rest are dying of irrelevance.<\u002Fp>\n      <p style=\"margin-bottom:20px;color:var(--ts);font-weight:400;font-size:18px;line-height:1.7\">They all sound identical. Faster. Cheaper. More scalable. They fight over fees and TPS in a red, bloody ocean.<\u002Fp>\n      <p style=\"margin-bottom:20px\">The 0.1 percent that escaped? <span style=\"color:var(--rose)\">Bitcoin. Ethereum. Immutable. Bittensor. Story. Hyperliquid.<\u002Fspan><\u002Fp>\n      <p style=\"color:var(--rose);font-family:var(--fs);font-style:italic;font-weight:400;font-size:clamp(24px,3.4vw,34px)\">They did not compete. They redefined the game.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:1180px;margin:64px auto 0\">\n    <h3 style=\"font-family:var(--fd);font-weight:700;font-size:clamp(24px,3.4vw,38px);letter-spacing:-0.02em;text-align:center;margin-bottom:30px\">Stop Fighting an Uphill Battle<\u002Fh3>\n    <div class=\"nz-grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;text-align:left\">\n      <div style=\"background:var(--card);border:1px solid var(--bsub);border-radius:16px;padding:24px 26px;display:flex;gap:15px;align-items:flex-start;box-shadow:var(--shadow)\"><span style=\"color:var(--rose);font-weight:700;font-size:17px;flex-shrink:0;line-height:1.6\">✕<\u002Fspan><span style=\"font-size:16px;color:var(--ts);line-height:1.6\">Your VC calls end with \"interesting, let us stay in touch.\" Which means no.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--bsub);border-radius:16px;padding:24px 26px;display:flex;gap:15px;align-items:flex-start;box-shadow:var(--shadow)\"><span style=\"color:var(--rose);font-weight:700;font-size:17px;flex-shrink:0;line-height:1.6\">✕<\u002Fspan><span style=\"font-size:16px;color:var(--ts);line-height:1.6\">Your team argues about how to describe the company in every single meeting.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--bsub);border-radius:16px;padding:24px 26px;display:flex;gap:15px;align-items:flex-start;box-shadow:var(--shadow)\"><span style=\"color:var(--rose);font-weight:700;font-size:17px;flex-shrink:0;line-height:1.6\">✕<\u002Fspan><span style=\"font-size:16px;color:var(--ts);line-height:1.6\">Your messaging changes every week, based on whoever gave feedback last.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--bsub);border-radius:16px;padding:24px 26px;display:flex;gap:15px;align-items:flex-start;box-shadow:var(--shadow)\"><span style=\"color:var(--rose);font-weight:700;font-size:17px;flex-shrink:0;line-height:1.6\">✕<\u002Fspan><span style=\"font-size:16px;color:var(--ts);line-height:1.6\">You burn months on campaigns that pull in airdrop farmers who have no idea what you do.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"text-align:center;margin-top:28px;color:var(--ts);font-size:17px;line-height:1.7;max-width:64ch;margin-left:auto;margin-right:auto\">When you do not define your category, the market does it for you. You get lumped in with everyone else and forced to compete on 10 percent faster or 20 percent cheaper, wars that drain your treasury and your marketing budget.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INSIGHT -->\n<section data-screen-label=\"Insight\" id=\"insight\" style=\"position:relative;z-index:2;padding:90px 26px;border-top:1px solid var(--bsub);text-align:center;overflow:hidden\">\n  <div style=\"max-width:1000px;margin:0 auto\">\n    <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose);margin-bottom:20px\">The Insight<\u002Fdiv>\n    <div style=\"font-family:var(--fd);font-weight:800;font-size:clamp(52px,11vw,128px);line-height:1;letter-spacing:-0.03em;display:flex;align-items:center;justify-content:center;gap:.16em;flex-wrap:wrap\">\n      <span style=\"font-family:var(--fs);font-weight:400;font-style:italic;color:var(--rose)\">Different<\u002Fspan>\n      <span style=\"color:var(--tt);font-weight:300\">&gt;<\u002Fspan>\n      <span style=\"color:var(--tt);text-decoration:line-through;text-decoration-thickness:5px;text-decoration-color:var(--sakura-deep)\">Better<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-family:var(--fd);font-weight:600;font-size:clamp(20px,2.8vw,28px);margin-top:22px;letter-spacing:-0.01em\">Better does not win. Different wins.<\u002Fdiv>\n    <p style=\"color:var(--ts);font-size:17px;line-height:1.75;max-width:62ch;margin:24px auto 0\">When you compete on better, you fight endless comparisons, like \"faster than Arbitrum\" or \"cheaper than Base.\" You are stuck in their category, where they already own the mindshare. Different creates a new category that is yours alone.<\u002Fp>\n    <div class=\"nz-grid3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:left;margin-top:42px\">\n      <div style=\"background:var(--card);border:1px solid var(--bsub);border-radius:16px;padding:26px;box-shadow:var(--shadow)\">\n        <div style=\"font-size:14px;color:var(--ts);margin-bottom:12px;line-height:1.5\">Ethereum did not beat Bitcoin at payments.<\u002Fdiv>\n        <div style=\"font-family:var(--fs);font-style:italic;font-size:21px;color:var(--rose)\">They defined programmable blockchains.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--bsub);border-radius:16px;padding:26px;box-shadow:var(--shadow)\">\n        <div style=\"font-size:14px;color:var(--ts);margin-bottom:12px;line-height:1.5\">Celestia did not beat Ethereum at speed.<\u002Fdiv>\n        <div style=\"font-family:var(--fs);font-style:italic;font-size:21px;color:var(--rose)\">They created modular blockchains.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--bsub);border-radius:16px;padding:26px;box-shadow:var(--shadow)\">\n        <div style=\"font-size:14px;color:var(--ts);margin-bottom:12px;line-height:1.5\">Hyperliquid did not beat Binance at perps.<\u002Fdiv>\n        <div style=\"font-family:var(--fs);font-style:italic;font-size:21px;color:var(--rose)\">They owned the fully onchain orderbook.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;background:var(--panel);border-radius:22px;padding:44px 40px;max-width:80ch;margin:42px auto 0;overflow:hidden\">\n      <div style=\"position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--sakura),transparent)\"><\u002Fdiv>\n      <div style=\"font-family:var(--fs);font-style:italic;font-weight:400;font-size:clamp(22px,3vw,32px);line-height:1.4;color:#F5EDE8\">If you cannot explain why you are different in one sentence, neither can your investors, your users, or your community.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CASE STUDIES -->\n<section data-screen-label=\"Case studies\" style=\"position:relative;z-index:2;padding:80px 26px;border-top:1px solid var(--bsub)\">\n  <div style=\"max-width:1180px;margin:0 auto;text-align:center\">\n    <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose);margin-bottom:18px\">Case Studies<\u002Fdiv>\n    <h2 style=\"font-family:var(--fd);font-weight:700;font-size:clamp(28px,4.2vw,46px);letter-spacing:-0.025em;color:var(--ink)\">We Have Watched This Win <span style=\"font-family:var(--fs);font-weight:400;font-style:italic;color:var(--rose)\">Up Close<\u002Fspan><\u002Fh2>\n    <p style=\"font-size:17px;color:var(--ts);max-width:60ch;margin:16px auto 0;line-height:1.7\">We were there for the L2 wars. We watched the projects that owned a category leave everyone else fighting over scraps.<\u002Fp>\n    <div class=\"nz-grid3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;text-align:left;margin-top:44px\">\n      <div style=\"padding:30px 4px 6px;border-top:2px solid var(--ink)\">\n        <div style=\"font-family:var(--fd);font-weight:700;font-size:21px;margin-bottom:14px\">Immutable<\u002Fdiv>\n        <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.04em;color:var(--ts)\">Owned <span style=\"background:var(--rose);color:#fff;padding:3px 9px;border-radius:6px;font-weight:500\">Web3 Gaming<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14px;color:var(--ts);margin-top:16px;line-height:1.7\">They did not say \"Ethereum but faster.\" When studios asked which L2 to build on, the answer was obvious. When VCs asked where gaming was happening, everyone pointed to Immutable.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:30px 4px 6px;border-top:2px solid var(--ink)\">\n        <div style=\"font-family:var(--fd);font-weight:700;font-size:21px;margin-bottom:14px\">Story Protocol<\u002Fdiv>\n        <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.04em;color:var(--ts)\">Owned <span style=\"background:var(--rose);color:#fff;padding:3px 9px;border-radius:6px;font-weight:500\">Programmable IP<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14px;color:var(--ts);margin-top:16px;line-height:1.7\">They did not fight to be another IP platform. They positioned programmable IP, owned the term, and made everyone else look like they were still using Web2 copyright lawyers.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:30px 4px 6px;border-top:2px solid var(--ink)\">\n        <div style=\"font-family:var(--fd);font-weight:700;font-size:21px;margin-bottom:14px\">Bittensor<\u002Fdiv>\n        <div style=\"font-family:var(--fm);font-size:1 o and brand colors only<\u002Fdiv>\n          <div style=\"font-size:15px;color:var(--ts);padding:10px 0 10px 26px;position:relative;line-height:1.5\"><span style=\"position:absolute;left:0;top:10px;color:var(--sakura-deep);font-weight:700\">✕<\u002Fspan>You do not have the team to ship the new assets<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section data-screen-label=\"FAQ\" style=\"position:relative;z-index:2;padding:80px 26px;border-top:1px solid var(--bsub)\">\n  <div style=\"max-width:840px;margin:0 auto\">\n    <div style=\"text-align:center\">\n      <div style=\"font-family:var(--fm);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose);margin-bottom:18px\">Questions<\u002Fdiv>\n      <h2 style=\"font-family:var(--fd);font-weight:700;font-size:clamp(28px,4.2vw,46px);letter-spacing:-0.025em;color:var(--ink);margin-bottom:36px\">Frequently Asked Questions<\u002Fh2>\n    <\u002Fdiv>\n    <details style=\"border-top:1px solid var(--bsub)\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:22px 0;font-family:var(--fd);font-weight:600;font-size:17px\"><span>What exactly do I get at the end?<\u002Fspan><span class=\"faq-ic\" style=\"font-size:24px;font-weight:300;color:var(--rose);transition:transform .25s ease;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n      <p style=\"padding:0 0 22px;color:var(--ts);font-size:15px;line-height:1.75;max-width:70ch\">Your positioning and narrative locked, plus the written assets that come from it: pitch deck copy, investor and sales deck, one pager, full website copy, litepaper narrative, and elevator pitch and FAQ. All in formats your team can edit and ship right away.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid var(--bsub)\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:22px 0;font-family:var(--fd);font-weight:600;font-size:17px\"><span>How is this different from a branding agency?<\u002Fspan><span class=\"faq-ic\" style=\"font-size:24px;font-weight:300;color:var(--rose);transition:transform .25s ease;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n      <p style=\"padding:0 0 22px;color:var(--ts);font-size:15px;line-height:1.75;max-width:70ch\">An agency hands you a logo and a color palette. We fix the thing underneath, which is what you say and why people should care. We start with strategy, then write the actual copy that goes live. Strategy and the finished words, not just visuals.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid var(--bsub)\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:22px 0;font-family:var(--fd);font-weight:600;font-size:17px\"><span>Do you really do all of this in 14 days?<\u002Fspan><span class=\"faq-ic\" style=\"font-size:24px;font-weight:300;color:var(--rose);transition:transform .25s ease;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n      <p style=\"padding:0 0 22px;color:var(--ts);font-size:15px;line-height:1.75;max-width:70ch\">Yes. We work in four tight phases and stay close to your team the whole way. Because we only take two teams at a time, you get our full focus and a clear finish line instead of a project that drags on for months.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid var(--bsub)\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:22px 0;font-family:var(--fd);font-weight:600;font-size:17px\"><span>What if our positioning is already mostly there?<\u002Fspan><span class=\"faq-ic\" style=\"font-size:24px;font-weight:300;color:var(--rose);transition:transform .25s ease;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n      <p style=\"padding:0 0 22px;color:var(--ts);font-size:15px;line-height:1.75;max-width:70ch\">Then we move faster on strategy and spend more time on the copy and assets. We assess where you are first, then build the plan around the gaps you actually have, not a fixed package.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid var(--bsub)\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:22px 0;font-family:var(--fd);font-weight:600;font-size:17px\"><span>Will you keep writing our content after this?<\u002Fspan><span class=\"faq-ic\" style=\"font-size:24px;font-weight:300;color:var(--rose);transition:transform .25s ease;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n      <p style=\"padding:0 0 22px;color:var(--ts);font-size:15px;line-height:1.75;max-width:70ch\">This offer has a clear start and a clear end. We hand you a strong narrative and the assets to match. If you want ongoing help after that, we can point you to the right next step.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border-top:1px solid var(--bsub);border-bottom:1px solid var(--bsub)\">\n      <summary style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;padding:22px 0;font-family:var(--fd);font-weight:600;font-size:17px\"><span>How do I start?<\u002Fspan><span class=\"faq-ic\" style=\"font-size:24px;font-weight:300;color:var(--rose);transition:transform .25s ease;flex-shrink:0\">+<\u002Fspan><\u002Fsummary>\n      <p style=\"padding:0 0 22px;color:var(--ts);font-size:15px;line-height:1.75;max-width:70ch\">Apply with a short note on your project, your stage, and your timeline. If it is a fit, we book a call to walk through where you are and what the overhaul would cover for you.<\u002Fp>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA -->\n<section data-screen-label=\"Final CTA\" style=\"position:relative;z-index:2;padding:100px 26px 70px;text-align:center;border-top:1px solid var(--bsub);overflow:hidden\">\n  <div style=\"position:absolute;bottom:-180px;left:50%;transform:translateX(-50%);width:1000px;height:600px;background:radial-gradient(ellipse at center,rgba(229,155,176,0.28),transparent 66%);pointer-events:none\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:760px;margin:0 auto\">\n    <div style=\"font-family:var(--fs);font-style:italic;font-size:48px;color:var(--rose);margin-bottom:18px\">望<\u002Fdiv>\n    <h2 style=\"font-family:var(--fd);font-weight:700;font-size:clamp(32px,5vw,58px);line-height:1.05;letter-spacing:-0.03em;color:var(--ink);max-width:18ch;margin:0 auto 18px\">Stop Being the Project <span style=\"font-family:var(--fs);font-weight:400;font-style:italic;color:var(--rose)\">Nobody Can Explain<\u002Fspan><\u002Fh2>\n    <p style=\"font-size:17px;color:var(--ts);max-width:56ch;margin:0 auto 32px;line-height:1.7\">We will talk about where you are, where you are trying to get, and what is blocking your story. No sales pitch. Just an honest conversation about your positioning.<\u002Fp>\n    <a href=\"https://forms.fillout.com/t/fiYYkaHNbeus\" style=\"font-family:var(--fd);font-weight:600;font-size:16px;color:#FBF5F0;background:var(--ink);text-decoration:none;padding:17px 36px;border-radius:100px;display:inline-flex;align-items:center;gap:10px;box-shadow:0 12px 40px rgba(26,16,24,0.2);transition:transform .25s ease\" style-hover=\"transform:translateY(-2px)\">Apply Now\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FBF5F0\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"position:relative;z-index:2;border-top:1px solid var(--bsub);padding:54px 26px 44px\">\n  <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:30px\" class=\"nz-foot\">\n    <div>\n      <img src=\"ddfa71fc-48b7-4413-816c-7af1293d7c20\" alt=\"Nozomi\" style=\"height:22px;width:auto;display:block;margin-bottom:14px\">\n      <p style=\"color:var(--ts);font-size:14px;max-width:42ch;line-height:1.7\">The home for Web3 founders. Resources, capital, network, and advisory to help founders plan, raise, launch, and scale.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h5 style=\"font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--tt);margin-bottom:14px\">Our Services<\u002Fh5>\n      <a href=\"https://nozomi.network/launchos/\" style=\"display:block;font-size:14px;color:var(--ts);padding:5px 0;text-decoration:none;transition:color .2s ease\" style-hover=\"color:var(--rose)\">LaunchOS<\u002Fa>\n      <a href=\"https://nozomi.network/gtm/\" style=\"display:block;font-size:14px;color:var(--ts);padding:5px 0;text-decoration:none;transition:color .2s ease\" style-hover=\"color:var(--rose)\">GTM Advisory<\u002Fa>\n      <a href=\"https://nozomi.network/positioning/\" style=\"display:block;font-size:14px;color:var(--ts);padding:5px 0;text-decoration:none;transition:color .2s ease\" style-hover=\"color:var(--rose)\">Narrative and Messaging<\u002Fa>\n      <a href=\"https://nozomi.network/vc-intros/\" style=\"display:block;font-size:14px;color:var(--ts);padding:5px 0;text-decoration:none;transition:color .2s ease\" style-hover=\"color:var(--rose)\">VC Intros<\u002Fa>\n    <\u002Fdiv>\n    <div>\n      <h5 style=\"font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--tt);margin-bottom:14px\">Company<\u002Fh5>\n      <a href=\"https://nozomi.network/about.html\" style=\"display:block;font-size:14px;color:var(--ts);padding:5px 0;text-decoration:none;transition:color .2s ease\" style-hover=\"color:var(--rose)\">About Us<\u002Fa>\n      <a href=\"https://nozomi.network/#network\" style=\"display:block;font-size:14px;color:var(--ts);padding:5px 0;text-decoration:none;transition:color .2s ease\" style-hover=\"color:var(--rose)\">Network<\u002Fa>\n      <a href=\"https://nozomi.network/newsletter/\" style=\"display:block;font-size:14px;color:var(--ts);padding:5px 0;text-decoration:none;transition:color .2s ease\" style-hover=\"color:var(--rose)\">Newsletter<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:1180px;margin:36px auto 0;color:var(--tt);font-size:13px\">© 2026 Nozomi. All rights reserved.<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._initSakura();\n  }\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n  _initSakura() {\n    const c = document.getElementById('nz-sakura');\n    if (!c) return;\n    const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n    const ctx = c.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    let cssW = 0, cssH = 0;\n    const colors = ['#E59BB0', '#D4869C', '#C4627A', '#E8C07A'];\n    const N = reduce ? 0 : 30;\n    const petals = [];\n    const rand = (a, b) => a + Math.random() * (b - a);\n    const mk = (initial) => ({\n      x: rand(0, cssW || window.innerWidth),\n      y: initial ? rand(-window.innerHeight, window.innerHeight) : rand(-80, -10),\n      size: rand(5, 11),\n      speed: rand(0.45, 1.4),\n      swaySpeed: rand(0.6, 1.6),\n      phase: rand(0, Math.PI * 2),\n      rot: rand(0, Math.PI * 2),\n      rotSpeed: rand(-0.02, 0.02),\n      opacity: rand(0.32, 0.72),\n      color: colors[(Math.random() * colors.length) | 0]\n    });\n    const resize = () => {\n      cssW = c.offsetWidth; cssH = c.offsetHeight;\n      c.width = cssW * dpr; c.height = cssH * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    };\n    this._onResize = resize;\n    window.addEventListener('resize', resize);\n    resize();\n    for (let i = 0; i < N; i++) petals.push(mk(true));\n    let t = 0;\n    const draw = (p) => {\n      ctx.save();\n      ctx.translate(p.x, p.y);\n      ctx.rotate(p.rot);\n      ctx.globalAlpha = p.opacity;\n      ctx.fillStyle = p.color;\n      ctx.shadowColor = p.color;\n      ctx.shadowBlur = 5;\n      const s = p.size;\n      ctx.beginPath();\n      ctx.moveTo(0, -s);\n      ctx.bezierCurveTo(s * 0.62, -s * 0.72, s * 0.5, s * 0.62, 0, s);\n      ctx.bezierCurveTo(-s * 0.5, s * 0.62, -s * 0.62, -s * 0.72, 0, -s);\n      ctx.fill();\n      ctx.restore();\n    };\n    const loop = () => {\n      t += 0.016;\n      ctx.clearRect(0, 0, cssW, cssH);\n      for (let i = 0; i < petals.length; i++) {\n        const p = petals[i];\n        p.y += p.speed;\n        p.x += Math.sin(t * p.swaySpeed + p.phase) * 0.4;\n        p.rot += p.rotSpeed;\n        if (p.y > cssH + 30) { petals[i] = mk(false); petals[i].x = rand(0, cssW); }\n        draw(petals[i]);\n      }\n      this._raf = requestAnimationFrame(loop);\n    };\n    if (N > 0) loop();\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
